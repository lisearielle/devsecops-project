name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Lint YAML
  # ─────────────────────────────────────────
  lint-yaml:
    name: "🔍 Lint YAML"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint k8s-deployment.yaml

  # ─────────────────────────────────────────
  # JOB 2 : Build Docker image
  # ─────────────────────────────────────────
  build-docker:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-api:latest .

      - name: Save Docker image as artifact
        run: docker save flask-api:latest -o flask-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: flask-api.tar

  # ─────────────────────────────────────────
  # JOB 3 : Scan Trivy (dépendances)
  # ─────────────────────────────────────────
  trivy-fs-scan:
    name: "🛡️ Trivy FS Scan (dépendances)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"

  # ─────────────────────────────────────────
  # JOB 4 : Scan Trivy (image Docker)
  # ─────────────────────────────────────────
  trivy-image-scan:
    name: "🐳 Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i flask-api.tar

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "flask-api:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"

  # ─────────────────────────────────────────
  # JOB 5 : Conftest (politique Kubernetes)
  # ─────────────────────────────────────────
  conftest-policy:
    name: "📋 Conftest Policy Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest on Kubernetes YAML
        run: conftest test k8s-deployment.yaml --policy policy/
        continue-on-error: true
